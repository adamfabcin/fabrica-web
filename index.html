/* ═══════════════════════════════════════
   TOKENS
═══════════════════════════════════════ */
:root {
  --bg:      #080807;
  --bg2:     #0e0e0c;
  --ink:     #f0ece4;
  --muted:   #3a3a38;
  --dim:     #555550;
  --fire:    #FF4520;
  --fire2:   #ff6a40;
  --border:  #161614;
}

/* ═══════════════════════════════════════
   BASE
═══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Outfit', sans-serif;
  font-weight: 300;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  cursor: none;
}
a { text-decoration: none; color: inherit; }

/* ═══════════════════════════════════════
   CUSTOM CURSOR
═══════════════════════════════════════ */
#cursor {
  position: fixed; z-index: 9999; pointer-events: none;
  top: 0; left: 0;
  mix-blend-mode: normal;
}
#cursor-dot {
  position: absolute;
  width: 6px; height: 6px;
  background: var(--fire);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: transform .1s ease;
}
#cursor-ring {
  position: absolute;
  width: 36px; height: 36px;
  border: 1px solid rgba(255,69,32,.35);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: width .35s ease, height .35s ease, border-color .35s ease, transform .08s ease;
}
body.hovering #cursor-ring {
  width: 56px; height: 56px;
  border-color: rgba(255,69,32,.6);
}

/* ═══════════════════════════════════════
   NOISE GRAIN
═══════════════════════════════════════ */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 9998; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity: .028;
}

/* ═══════════════════════════════════════
   NAV
═══════════════════════════════════════ */
#nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 500;
  padding: 0 48px;
  height: 64px;
  display: flex; align-items: center; justify-content: space-between;
  transition: background .4s ease, border-color .4s ease;
  border-bottom: 1px solid transparent;
}
#nav.scrolled {
  background: rgba(8,8,7,.88);
  backdrop-filter: blur(24px);
  border-bottom-color: var(--border);
}
.nav-logo {
  display: flex; align-items: center; gap: 10px;
  font-size: 15px; font-weight: 700; letter-spacing: .16em;
}
.nav-links {
  display: flex; gap: 36px;
}
.nav-links a {
  font-size: 12px; letter-spacing: .06em; color: var(--dim);
  transition: color .25s;
}
.nav-links a:hover { color: var(--ink); }
.nav-cta {
  font-size: 12px; letter-spacing: .08em;
  padding: 9px 22px; border: 1px solid var(--muted);
  color: var(--ink);
  transition: border-color .25s, background .25s;
}
.nav-cta:hover { border-color: var(--fire); background: rgba(255,69,32,.06); }
/* ═══════════════════════════════════════
   HERO
═══════════════════════════════════════ */
#hero {
  min-height: 100vh;
  display: flex; flex-direction: column;
  justify-content: flex-end;
  padding: 0 48px 80px;
  position: relative; overflow: hidden;
}
#hero::after {
  content: '';
  position: absolute;
  bottom: 20%;
  left: 5%;
  width: 750px; height: 240px;
  background: radial-gradient(ellipse, rgba(255,69,32,.07) 0%, transparent 65%);
  pointer-events: none; z-index: 0;
  opacity: 0;
  animation: glowReveal 2s ease 2.9s forwards;
}
@keyframes glowReveal {
  from { opacity: 0; transform: scale(.85); }
  to   { opacity: 1; transform: scale(1); }
}

/* Canvas for particle/grid bg */
#hero-canvas {
  position: absolute; inset: 0; z-index: 0;
}

/* Large background F — architectural */
.hero-bg-mark {
  position: absolute;
  right: -2%; top: 50%;
  transform: translateY(-50%);
  z-index: 1; pointer-events: none;
  opacity: .032;
}

.hero-content {
  position: relative; z-index: 2;
  max-width: 980px;
}

.hero-eyebrow {
  font-size: 11px; letter-spacing: .38em; text-transform: uppercase;
  color: var(--dim); margin-bottom: 32px;
  display: flex; align-items: center; gap: 14px;
  animation: fadeUp .8s ease .4s both;
}
.hero-eyebrow::before {
  content: ''; width: 28px; height: 1px; background: var(--fire); flex-shrink: 0;
}

.hero-title {
  font-size: clamp(52px, 9vw, 120px);
  font-weight: 900;
  letter-spacing: -.02em;
  line-height: .95;
  color: var(--ink);
  animation: fadeUp .9s cubic-bezier(.16,1,.3,1) .55s both;
}
.hero-title em {
  font-style: normal;
  color: transparent;
  -webkit-text-stroke: 1px rgba(240,236,228,.2);
}

.hero-bottom {
  display: flex; align-items: flex-end; justify-content: space-between;
  margin-top: 56px; flex-wrap: wrap; gap: 32px;
  animation: fadeUp .8s ease .9s both;
}
.hero-desc {
  font-size: 17px; font-weight: 300; line-height: 1.7;
  color: var(--dim); max-width: 420px;
}
.hero-desc span { color: var(--ink); }

.hero-cta-row { display: flex; align-items: center; gap: 20px; flex-shrink: 0; }

.btn-primary {
  display: inline-flex; align-items: center; gap: 10px;
  background: var(--fire); color: white;
  padding: 14px 28px;
  font-size: 13px; font-weight: 600; letter-spacing: .06em;
  transition: background .25s, transform .2s;
}
.btn-primary:hover { background: var(--fire2); transform: translateY(-1px); }

.btn-ghost {
  font-size: 13px; color: var(--dim); letter-spacing: .06em;
  display: flex; align-items: center; gap: 8px;
  transition: color .25s;
}
.btn-ghost:hover { color: var(--ink); }
.btn-ghost-arrow { transition: transform .25s; }
.btn-ghost:hover .btn-ghost-arrow { transform: translateX(4px); }

.hero-scroll-line {
  position: absolute; right: 48px; bottom: 48px;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  z-index: 2;
  animation: fadeIn 1s ease 2.4s both;
}
.scroll-text {
  font-size: 10px; letter-spacing: .32em; text-transform: uppercase;
  color: var(--dim); writing-mode: vertical-rl;
}
.scroll-track {
  width: 1px; height: 55px; background: var(--muted); overflow: hidden; position: relative;
}
.scroll-thumb {
  position: absolute; top: 0; left: 0; width: 2px; margin-left: -0.5px;
  background: var(--fire);
  animation: scrollDown 1.8s cubic-bezier(.4,0,.2,1) infinite 2.4s;
}
@keyframes scrollDown {
  0%   { top: -100%; height: 45%; opacity: 0; }
  15%  { opacity: 1; }
  85%  { opacity: 1; }
  100% { top: 145%;  height: 45%; opacity: 0; }
}

/* ═══════════════════════════════════════
   TICKER
═══════════════════════════════════════ */
.ticker-wrap {
  overflow: hidden; white-space: nowrap;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 18px 0;
  background: var(--bg2);
}
.ticker-inner {
  display: inline-flex; gap: 0;
  animation: ticker 20s linear infinite;
}
.ticker-item {
  display: inline-flex; align-items: center; gap: 40px;
  padding: 0 40px;
  font-size: 12px; letter-spacing: .25em; text-transform: uppercase; color: var(--dim);
}
.ticker-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--fire); flex-shrink: 0; }
@keyframes ticker { from { transform: translateX(0) } to { transform: translateX(-50%) } }

/* ═══════════════════════════════════════
   SERVICES
═══════════════════════════════════════ */
#services {
  padding: 140px 48px;
  max-width: 1100px; margin: 0 auto;
}

.section-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 80px; gap: 40px; flex-wrap: wrap;
}
.sh-left { display: flex; flex-direction: column; gap: 16px; }
.sh-num {
  font-size: 10px; letter-spacing: .4em; text-transform: uppercase; color: var(--dim);
}
.sh-title {
  font-size: clamp(34px, 5vw, 56px); font-weight: 700;
  letter-spacing: -.025em; line-height: 1.05;
}
.sh-right {
  max-width: 340px; font-size: 15px; font-weight: 300;
  line-height: 1.75; color: var(--dim); padding-top: 36px;
}

.services-list { display: flex; flex-direction: column; }
.service-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 28px 0;
  border-top: 1px solid var(--border);
  cursor: none;
  transition: border-color .3s;
  position: relative; overflow: hidden;
  gap: 24px;
}
.service-row:last-child { border-bottom: 1px solid var(--border); }
.service-row::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 0;
  background: rgba(255,69,32,.04);
  transition: width .4s cubic-bezier(.16,1,.3,1);
}
.service-row:hover::before { width: 100%; }
.service-row:hover { border-color: var(--muted); }

.srv-num { font-size: 11px; letter-spacing: .2em; color: var(--muted); width: 36px; flex-shrink: 0; }
.srv-name {
  font-size: clamp(22px, 3vw, 32px); font-weight: 600;
  letter-spacing: -.01em; flex: 1;
  transition: color .25s;
}
.service-row:hover .srv-name { color: var(--ink); }
.srv-tag {
  font-size: 11px; letter-spacing: .15em; text-transform: uppercase;
  color: var(--muted); transition: color .25s;
}
.service-row:hover .srv-tag { color: var(--dim); }
.srv-arrow {
  font-size: 18px; color: var(--muted); flex-shrink: 0;
  transform: translateX(-6px);
  transition: transform .3s ease, color .25s;
}
.service-row:hover .srv-arrow { transform: translateX(0); color: var(--fire); }

/* ═══════════════════════════════════════
   WORK / PROJECTS
═══════════════════════════════════════ */
#work {
  padding: 0 48px 140px;
  max-width: 1100px; margin: 0 auto;
}

.work-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto;
  gap: 12px;
  margin-top: 0;
}

.work-card {
  position: relative; overflow: hidden;
  cursor: none;
}
.work-card.big { grid-column: 1 / 2; grid-row: 1 / 3; }
.work-card.tall { aspect-ratio: .75; }
.work-card.wide { aspect-ratio: 16/9; }
.work-card.sq   { aspect-ratio: 1; }

.wc-bg {
  position: absolute; inset: 0;
  transition: transform .7s cubic-bezier(.16,1,.3,1);
}
.work-card:hover .wc-bg { transform: scale(1.03); }

.bg1 { background: linear-gradient(135deg, #131210 0%, #1e1a14 100%); }
.bg2 { background: linear-gradient(135deg, #0f1114 0%, #1a1e22 100%); }
.bg3 { background: linear-gradient(135deg, #120f0d 0%, #1f1510 100%); }
.bg4 { background: linear-gradient(135deg, #0e1210 0%, #151e18 100%); }

/* Abstract mark inside each card */
.wc-mark {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  opacity: .06; pointer-events: none;
}

.wc-content {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 28px 32px;
  background: linear-gradient(to top, rgba(8,8,7,.95) 0%, transparent 100%);
}
.wc-cat { font-size: 9px; letter-spacing: .35em; text-transform: uppercase; color: var(--dim); }
.wc-title { font-size: clamp(16px, 2vw, 22px); font-weight: 600; letter-spacing: -.01em; margin-top: 6px; }
.wc-fire-tag {
  display: inline-block; background: var(--fire); color: white;
  font-size: 9px; letter-spacing: .2em; text-transform: uppercase;
  padding: 3px 8px; margin-top: 8px;
}

/* ═══════════════════════════════════════
   ABOUT / STATEMENT
═══════════════════════════════════════ */
#about {
  padding: 140px 48px;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  position: relative; overflow: hidden;
}

.about-inner {
  max-width: 1100px; margin: 0 auto;
  display: grid; grid-template-columns: 1fr 2fr; gap: 80px; align-items: start;
}

.about-left { display: flex; flex-direction: column; gap: 32px; padding-top: 8px; }
.about-portrait {
  width: 180px; height: 220px;
  background: var(--bg);
  border: 1px solid var(--border);
  position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.portrait-placeholder {
  opacity: .08; pointer-events: none;
}
.about-name { font-size: 16px; font-weight: 600; letter-spacing: .06em; }
.about-role { font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: var(--dim); margin-top: 4px; }

.about-right { display: flex; flex-direction: column; gap: 40px; }
.about-statement {
  font-size: clamp(26px, 3.5vw, 42px);
  font-weight: 300; line-height: 1.4; letter-spacing: -.01em;
  color: var(--ink);
}
.about-statement strong { font-weight: 700; color: var(--ink); }
.about-statement em { font-style: normal; color: var(--fire); }

.about-stats {
  display: flex; gap: 56px; flex-wrap: wrap;
  padding-top: 32px; border-top: 1px solid var(--border);
}
.stat { display: flex; flex-direction: column; gap: 4px; }
.stat-num { font-size: 40px; font-weight: 900; letter-spacing: -.02em; color: var(--ink); line-height: 1; }
.stat-num span { color: var(--fire); }
.stat-label { font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: var(--dim); }

/* ═══════════════════════════════════════
   PROCESS
═══════════════════════════════════════ */
#process {
  padding: 140px 48px;
  max-width: 1100px; margin: 0 auto;
}

.process-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px;
  background: var(--border); margin-top: 72px;
}
.process-cell {
  background: var(--bg); padding: 40px 32px;
  display: flex; flex-direction: column; gap: 20px;
  transition: background .3s;
}
.process-cell:hover { background: var(--bg2); }
.pc-num { font-size: 11px; letter-spacing: .3em; text-transform: uppercase; color: var(--fire); }
.pc-title { font-size: 20px; font-weight: 600; letter-spacing: -.01em; }
.pc-desc { font-size: 13px; line-height: 1.75; color: var(--dim); font-weight: 300; }
@media(max-width:480px){ .process-grid { grid-template-columns: 1fr; } }

/* ═══════════════════════════════════════
   CTA FOOTER
═══════════════════════════════════════ */
#cta {
  padding: 160px 48px;
  text-align: center;
  position: relative; overflow: hidden;
}

.cta-glow {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 500px; height: 300px;
  background: radial-gradient(ellipse, rgba(255,69,32,.13) 0%, transparent 70%);
  pointer-events: none;
  animation: glowPulse 3s ease-in-out infinite;
}
@keyframes glowPulse {
  0%,100% { opacity: .6; transform: translate(-50%,-50%) scale(1); }
  50%      { opacity: 1; transform: translate(-50%,-50%) scale(1.1); }
}

.cta-inner { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; }
.cta-label { font-size: 11px; letter-spacing: .38em; text-transform: uppercase; color: var(--dim); margin-bottom: 28px; }
.cta-title {
  font-size: clamp(44px, 7vw, 88px); font-weight: 900;
  letter-spacing: -.025em; line-height: .95; margin-bottom: 40px;
}
.cta-title em { font-style: normal; color: var(--fire); }
.cta-email {
  font-size: 18px; letter-spacing: .04em; color: var(--dim);
  transition: color .25s;
}
.cta-email:hover { color: var(--fire); }

/* ═══════════════════════════════════════
   FOOTER
═══════════════════════════════════════ */
footer {
  padding: 32px 48px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 16px;
}
.foot-left { display: flex; align-items: center; gap: 12px; }
.foot-wm { font-size: 13px; font-weight: 700; letter-spacing: .16em; }
.foot-copy { font-size: 11px; color: var(--muted); letter-spacing: .06em; }
.foot-links { display: flex; gap: 24px; }
.foot-links a { font-size: 11px; color: var(--muted); letter-spacing: .08em; transition: color .2s; }
.foot-links a:hover { color: var(--dim); }
/* ═══════════════════════════════════════
   REVEAL
═══════════════════════════════════════ */
.reveal {
  opacity: 0; transform: translateY(28px);
  transition: opacity .8s ease, transform .8s cubic-bezier(.16,1,.3,1);
}
.reveal.d1 { transition-delay: .1s; }
.reveal.d2 { transition-delay: .2s; }
.reveal.d3 { transition-delay: .3s; }
.reveal.d4 { transition-delay: .4s; }
.reveal.vis { opacity: 1; transform: none; }

@keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

/* ── Word mask reveal ── */
.hero-title {
  display: flex;
  flex-wrap: wrap;
  gap: 0 .28em;
  align-items: baseline;
}
/* each .tl clips its child */
.tl {
  display: inline-block;
  overflow: hidden;
  line-height: 1.05;
  padding-bottom: .06em; /* prevent descender clip */
}
.tw {
  display: inline-block;
  transform: translateY(110%);
  opacity: 0;
}
.fire-word { color: transparent; -webkit-text-stroke: 1px rgba(240,236,228,.12); }
/* fired by JS */
.tw.revealed {
  animation: wordUp .9s cubic-bezier(.16,1,.3,1) forwards;
}
@keyframes wordUp {
  from { transform: translateY(105%); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

/* ═══════════════════════════════════════
   CLIENTS SECTION
═══════════════════════════════════════ */
#clients {
  padding: 140px 48px;
  max-width: 1100px; margin: 0 auto;
}

.clients-header {
  display: flex; align-items: flex-end; justify-content: space-between;
  margin-bottom: 80px; gap: 40px; flex-wrap: wrap;
}
.clients-tagline {
  font-size: 15px; font-weight: 300; color: var(--dim);
  max-width: 280px; line-height: 1.7; padding-bottom: 6px;
}

.clients-track-wrap {
  position: relative; overflow: hidden;
}
/* fade edges */
.clients-track-wrap::before,
.clients-track-wrap::after {
  content: '';
  position: absolute; top: 0; bottom: 0; width: 120px; z-index: 2; pointer-events: none;
}
.clients-track-wrap::before { left: 0;  background: linear-gradient(to right, var(--bg), transparent); }
.clients-track-wrap::after  { right: 0; background: linear-gradient(to left,  var(--bg), transparent); }

.clients-track {
  display: flex; align-items: center; gap: 80px;
  animation: clientsScroll 18s linear infinite;
  width: max-content;
}
.clients-track:hover { animation-play-state: paused; }
@media(max-width:768px){ .clients-track { animation-duration: 12s; } }

@keyframes clientsScroll {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}

.client-logo {
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  height: 52px;
  
  transition: opacity .4s ease, transform .4s ease;
  cursor: default;
}
.client-logo:hover {
  
  transform: scale(1.05);
}
.client-logo img {
  height: 100%; width: auto; max-width: 200px;
  object-fit: contain;
  filter: brightness(0) invert(1) opacity(0.4);
  transition: filter .4s ease;
}
.client-logo:hover img {
  filter: brightness(0) invert(1);
}

/* ── Easter egg: F grid ── */
#hero-grid-canvas {
  position: absolute; inset: 0; z-index: 1; pointer-events: none;
}
#hero-click-zone {
  position: absolute;
  top: 0; left: 0; right: 0;
  /* covers top 55% of hero — above the text block */
  height: 55%;
  z-index: 3;
  cursor: none;
}
